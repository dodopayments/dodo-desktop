[package]
name = "dodo-payments"
version = "0.1.0"
description = "Dodo Payments Desktop App"
authors = ["Dodo Payments"]
license = "MIT"
repository = ""
default-run = "dodo-payments"
edition = "2021"
rust-version = "1.77"

[lib]
name = "app_lib"
crate-type = ["rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde_json = "1"
serde = { version = "1", features = ["derive"] }
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-notification = "2"
open = "5"
